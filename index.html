<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <link rel="stylesheet" href="css/common.css" />
    <link rel="stylesheet" href="css/index.css" />
    <title>Document</title>
  </head>
  <body>
    <!-- 유태구 -->
    <header class="d-flex justify-content-center">
      <div class="container d-flex justify-content-between">
        <div class="logo-group d-flex align-items-center">
          <a href=""></a>
          <h1>
            <a href=""><span class="ir">EST Camp</span></a>
          </h1>
        </div>
        <nav class="d-flex">
          <a href="" class="nav-item">강좌보기</a>
          <a href="" class="nav-item">지원하기</a>
        </nav>
      </div>
    </header>
    <!-- //유태구-->

    <!-- 조승아 -->
    <aside>
      <nav></nav>
    </aside>
    <!-- //조승아 -->
    <main>
      <!-- 유태구-->
      <section class="hero"></section>
      <section class="employment-status d-flex flex-column align-items-center">
        <div class="d-flex flex-column align-items-center g-1">
          <p class="heading-m">수료생 주요 취업 현황</p>
          <p class="body-mp">실무 역량을 입증한 수료생들은 IT업계 전반에서 활약하고 있습니다.</p>
        </div>
        <div class="logo-carousel d-flex g-1">
          <img src="image/carousel-tridge-logo.png" alt="tridge" />
          <img src="image/carousel-navercloud-logo.png" alt="navercloud" />
          <img src="image/carousel-weniv-logo.png" alt="weniv" />
          <img src="image/carousel-inbody-logo.png" alt="weniv" />
          <img src="image/carousel-hyundai-logo.png" alt="hyundai" />
          <img src="image/carousel-est-logo.png" alt="est" />
          <img src="image/carousel-thankscarbon-logo.png" alt="thankscarbon" />
          <img src="image/carousel-evsis-logo.png" alt="evsis" />
          <div class="mask-logo-carousel"></div>
        </div>
      </section>
      <!-- //유태구 -->

      <!-- 박소영 -->
      <section class="top-slogan">
        <h4>기업이 원하는 인재가 되고 싶다면?</h4>
        <h1><span>이스트소프트</span>가 정답인 이유</h1>
      </section>
      <section class="benefits"></section>
      <section class="statistics"></section>
      <!-- //박소영 -->

      <!-- 박채원 -->
      <section class="review"></section>
      <section class="training-eligibility"></section>
      <section class="bottom-slogan"></section>
      <!-- //박채원 -->

      <!-- 조승아 -->
      <section class="courses"></section>
      <section class="target-audience"></section>
      <!-- //조승아 -->

      <!-- 권유진 -->
      <section class="est-content"></section>
      <section class="faq"></section>
      <section class="deadline"></section>
    </main>
    <footer></footer>
    <!-- //권유진 -->
  </body>
</html>
