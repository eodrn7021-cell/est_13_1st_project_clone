<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/common.css" />
    <link rel="stylesheet" href="css/index.css" />
    <title>Document</title>
  </head>
  <body>
    <!-- 유태구 -->
    <header><h1>제목</h1></header>
    <!-- //유태구-->

    <!-- 조승아 -->
    <aside>
      <nav></nav>
    </aside>
    <!-- //조승아 -->
    <main>
      <!-- 유태구-->
      <section class="hero"></section>
      <section class="employment-status"></section>
      <!-- //유태구 -->

      <!-- 박소영 -->
      <section class="top-slogan"></section>
      <section class="benefits"></section>
      <section class="statistics"></section>
      <!-- //박소영 -->

      <!-- 박채원 -->
      <section class="review"></section>
      <section class="training-eligibility"></section>
      <section class="bottom-slogan"></section>
      <!-- //박채원 -->

      <!-- 조승아 -->
      <section class="courses"></section>
      <section class="target-audience"></section>
      <!-- //조승아 -->

      <!-- 권유진 -->
      <section class="est-content">
        <div class="section-header">
          <h2>이스트 캠프 콘텐츠</h2>
          <p>이스트캠프의 <span>다양한 이야기</span>를 들어보세요!</p>
        </div>

        <div class="slider-container">
          <button class="prev-btn" aria-label="이전"></button>
          <div class="card-list">
            <article class="est-content">
              <div class="image">
                <img src="content_2.png" alt="콘텐츠 이미지" />
              </div>
              <div class="card-body">
                <h3>부트캠프만으로 진짜 취업할수있을까?</h3>
                <p>청년 고용율의 내리막... 현실은 잔혹하지만, 돌파구는 있습니다.</p>
                <a href="#" class="more-link">icon</a>
              </div>
              <div class="image">
                <img src="content_1.png" alt="콘텐츠 이미지" />
              </div>
              <div class="card-body">
                <h3>우리는 조금 느렸지만, 분명 다릅니다</h3>
                <p>부트캠프 시장의 후발주자 ’이스트캠프’의 반란</p>
                <a href="#" class="more-link">icon</a>
              </div>
              <div class="image">
                <img src="content_3.png" alt="콘텐츠 이미지" />
              </div>
              <div class="card-body">
                <h3>“저희를 믿고 한 걸음 내딛어 주세요”</h3>
                <p>이스트캠프 교육 운영 담당자 홍유라님의 릴레이 인터뷰</p>
                <a href="#" class="more-link">icon</a>
              </div>
              <div class="image">
                <img src="content_4.png" alt="콘텐츠 이미지" />
              </div>
              <div class="card-body">
                <h3>“백엔드는 취업 자리가 비교적 많아요”</h3>
                <p>이스트 캠프 백엔드 개발 정동형 강사님의 릴레이 인터뷰</p>
                <a href="#" class="more-link">icon</a>
              </div>
            </article>
          </div>
          <button class="next-btn" aria-label="다음"></button>
        </div>
      </section>
      <section class="faq"></section>
      <section class="deadline"></section>
    </main>
    <footer></footer>
    <!-- //권유진 -->
  </body>
</html>
