<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/common.css" />
    <link rel="stylesheet" href="css/index.css" />
    <title>Document</title>
  </head>
  <body>
    <!-- 유태구 -->
    <header class="d-flex justify-content-center">
      <div class="container d-flex justify-content-between">
        <div class="logo-group d-flex align-items-center">
          <a href=""></a>
          <h1>
            <a href=""><span class="ir">EST Camp</span></a>
          </h1>
        </div>
        <nav class="d-flex">
          <a href="" class="nav-item">강좌보기</a>
          <a href="" class="nav-item">지원하기</a>
        </nav>
      </div>
    </header>
    <!-- //유태구-->

    <!-- 조승아 -->
    <aside>
      <nav></nav>
    </aside>
    <!-- //조승아 -->
    <main>
      <!-- 유태구-->
      <section class="hero"></section>
      <section class="employment-status d-flex flex-column align-items-center">
        <section class="d-flex flex-column g-1"></section>
      </section>
      <!-- //유태구 -->

      <!-- 박소영 -->
      <section class="top-slogan">
        <h2 class="heading-s">기업이 원하는 인재가 되고 싶다면?</h2>
        <h2 class="heading-xl"><span>이스트소프트</span>가 정답인 이유</h2>
      </section>
      <section class="benefits"></section>
      <section class="statistics d-flex justify-content-center">
        <div class="container d-flex flex-column g-2">
          <h2 class="heading-l">실무에 강한 교육, 결과로 증명합니다.</h2>
          <div class="statistics-items-wrapper d-flex">
            <div class="statistics-item">
              <div>
                <h6>누적 수강생</h6>
                <p>10,000+</p>
              </div>
            </div>
            <div class="statistics-item">
              <div>
                <h6>교육 만족도</h6>
                <p>4.7점</p>
              </div>
            </div>
            <div class="statistics-item">
              <div>
                <h6>학습 완주율</h6>
                <p>94.2%</p>
              </div>
            </div>
          </div>
        </div>
      </section>
      <!-- //박소영 -->

      <!-- 박채원 -->
      <section class="review"></section>
      <section class="training-eligibility"></section>
      <section class="bottom-slogan"></section>
      <!-- //박채원 -->

      <!-- 조승아 -->
      <section class="courses"></section>
      <section class="target-audience"></section>
      <!-- //조승아 -->

      <!-- 권유진 -->
      <section class="est-content"></section>
      <section class="faq"></section>
      <section class="deadline"></section>
    </main>
    <footer></footer>
    <!-- //권유진 -->
  </body>
</html>
